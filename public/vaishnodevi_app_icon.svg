<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="icon-clip">
      <rect x="0" y="0" width="1024" height="1024" rx="230"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" fill="#8B0000"/>

  <!-- Gold outer border ring -->
  <rect x="36" y="36" width="952" height="952" rx="200" fill="none" stroke="#D4AF37" stroke-width="12"/>

  <!-- Inner decorative dashed ring -->
  <rect x="68" y="68" width="888" height="888" rx="175" fill="none" stroke="#D4AF37" stroke-width="5" stroke-dasharray="24,12"/>

  <!-- Top decorative trishul dots + line -->
  <circle cx="380" cy="165" r="16" fill="#D4AF37"/>
  <circle cx="512" cy="135" r="20" fill="#D4AF37"/>
  <circle cx="644" cy="165" r="16" fill="#D4AF37"/>
  <line x1="380" y1="165" x2="512" y2="135" stroke="#D4AF37" stroke-width="8"/>
  <line x1="512" y1="135" x2="644" y2="165" stroke="#D4AF37" stroke-width="8"/>

  <!-- OM symbol - large and centered -->
  <text x="512" y="700" text-anchor="middle" font-family="serif" font-size="520" fill="#D4AF37" font-weight="bold">ॐ</text>

  <!-- VDC text -->
  <text x="512" y="880" text-anchor="middle" font-family="sans-serif" font-size="100" fill="#FFFFFF" font-weight="bold" letter-spacing="28">VDC</text>

  <!-- Bottom gold bar -->
  <rect x="312" y="900" width="400" height="12" rx="6" fill="#D4AF37"/>

  <!-- Corner sparkles -->
  <circle cx="160" cy="200" r="14" fill="#D4AF37" opacity="0.6"/>
  <circle cx="864" cy="200" r="14" fill="#D4AF37" opacity="0.6"/>
  <circle cx="160" cy="824" r="14" fill="#D4AF37" opacity="0.6"/>
  <circle cx="864" cy="824" r="14" fill="#D4AF37" opacity="0.6"/>
</svg>
