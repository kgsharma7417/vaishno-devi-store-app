<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="#7B1A1A" stroke="#D4A017" stroke-width="3"/>
  
  <!-- Outer decorative ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#D4A017" stroke-width="1.5" stroke-dasharray="6,4"/>
  
  <!-- Bangle/bracelet shape - outer -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="#D4A017" stroke-width="10"/>
  
  <!-- Bangle shine detail -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="#F5C842" stroke-width="3" stroke-dasharray="18,10" stroke-linecap="round"/>
  
  <!-- Bangle inner ring -->
  <circle cx="100" cy="100" r="58" fill="none" stroke="#D4A017" stroke-width="1.5"/>

  <!-- Center lotus / flower design -->
  <!-- 8 petals -->
  <g transform="translate(100,100)">
    <ellipse rx="8" ry="18" fill="#D4A017" opacity="0.9" transform="rotate(0) translate(0,-24)"/>
    <ellipse rx="8" ry="18" fill="#D4A017" opacity="0.9" transform="rotate(45) translate(0,-24)"/>
    <ellipse rx="8" ry="18" fill="#D4A017" opacity="0.9" transform="rotate(90) translate(0,-24)"/>
    <ellipse rx="8" ry="18" fill="#D4A017" opacity="0.9" transform="rotate(135) translate(0,-24)"/>
    <ellipse rx="8" ry="18" fill="#D4A017" opacity="0.9" transform="rotate(180) translate(0,-24)"/>
    <ellipse rx="8" ry="18" fill="#D4A017" opacity="0.9" transform="rotate(225) translate(0,-24)"/>
    <ellipse rx="8" ry="18" fill="#D4A017" opacity="0.9" transform="rotate(270) translate(0,-24)"/>
    <ellipse rx="8" ry="18" fill="#D4A017" opacity="0.9" transform="rotate(315) translate(0,-24)"/>
    <!-- Center dot -->
    <circle r="9" fill="#F5C842"/>
    <circle r="5" fill="#7B1A1A"/>
  </g>

  <!-- Small decorative dots on the ring -->
  <circle cx="100" cy="32" r="4" fill="#F5C842"/>
  <circle cx="100" cy="168" r="4" fill="#F5C842"/>
  <circle cx="32" cy="100" r="4" fill="#F5C842"/>
  <circle cx="168" cy="100" r="4" fill="#F5C842"/>
  <circle cx="152" cy="48" r="3" fill="#F5C842"/>
  <circle cx="48" cy="48" r="3" fill="#F5C842"/>
  <circle cx="152" cy="152" r="3" fill="#F5C842"/>
  <circle cx="48" cy="152" r="3" fill="#F5C842"/>

  <!-- Top text: Maa Vaishno Devi -->
  <text 
    x="100" 
    y="19" 
    text-anchor="middle" 
    font-family="Georgia, serif" 
    font-size="11" 
    font-weight="bold" 
    fill="#F5C842"
    letter-spacing="1.5">MAA VAISHNO DEVI</text>

  <!-- Bottom text: Ladies Corner -->
  <text 
    x="100" 
    y="188" 
    text-anchor="middle" 
    font-family="Georgia, serif" 
    font-size="10" 
    fill="#F5C842"
    letter-spacing="2">LADIES CORNER</text>
</svg>
